<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>OMNISCIENT AI — ULTIMATE</title><style>
body{background:#020617;color:white;font-family:Arial;text-align:center;padding:15px}
h1{color:#22c55e;font-size:28px;margin-bottom:15px}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
button{padding:16px;font-size:26px;background:#1e293b;color:white;border:none;border-radius:10px}

.controls{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}

.section{background:#0f172a;margin-top:15px;padding:10px;border-radius:12px}

.history span{background:#1e293b;padding:5px 8px;margin:2px;border-radius:6px}

.heat span{padding:4px 6px;margin:2px;border-radius:6px;display:inline-block}
</style></head><body><h1>OMNISCIENT AI 💀🔥</h1><div class="grid">
<button onclick="add('🌽')">🌽</button>
<button onclick="add('🍅')">🍅</button>
<button onclick="add('🥕')">🥕</button>
<button onclick="add('🌶️')">🌶️</button>
<button onclick="add('🐟')">🐟</button>
<button onclick="add('🦐')">🦐</button>
<button onclick="add('🐄')">🐄</button>
<button onclick="add('🐔')">🐔</button>
</div><div class="controls">
<button onclick="toggleBot()">BOT</button>
<button onclick="toggleAuto()">AUTO</button>
<button onclick="undo()">Undo</button>
<button onclick="reset()">Reset</button>
</div><div class="section"><b>History</b><div id="history"></div></div><div class="section"><b>Heatmap</b><div id="heat"></div></div><div class="section"><b>AI Analysis</b><div id="analysis"></div></div><div class="section"><b>Prediction</b><div id="prediction"></div></div><script>

const foods=["🌽","🍅","🥕","🌶️","🐟","🦐","🐄","🐔"]
const veg=["🌽","🍅","🥕","🌶️"]
const meat=["🐟","🦐","🐄","🐔"]

let history=[]
let memory={}
let memory2={}
let bot=false
let auto=false

/* STORAGE */
function save(){
localStorage.setItem("ULTIMATE_AI",JSON.stringify({history,memory,memory2}))
}

function load(){
let d=localStorage.getItem("ULTIMATE_AI")
if(d){
let x=JSON.parse(d)
history=x.history||[]
memory=x.memory||{}
memory2=x.memory2||{}
}
}

/* ADD */
function add(f){
history.push(f)

let k3=history.slice(-3).join("-")
memory[k3]=(memory[k3]||0)+1

let k2=history.slice(-2).join("-")
memory2[k2]=(memory2[k2]||0)+1

update()
save()
}

function undo(){history.pop();update();save()}
function reset(){history=[];update();save()}

/* ABSENCE */
function absence(f){
let last=history.lastIndexOf(f)
let gap= last==-1?history.length:history.length-last
let miss=history.slice(-20).filter(x=>x!==f).length
return {gap,miss}
}

/* HEAT */
function heat(){
return foods.map(f=>{
let c=history.slice(-20).filter(x=>x==f).length
let color=c>5?"#16a34a":c>3?"#22c55e":"#1e293b"
return "<span style='background:"+color+"'>"+f+" "+c+"</span>"
}).join("")
}

/* SUPER AI */
function brain(){

let s={}

foods.forEach(f=>{

let score=0

/* freq */
score+=history.slice(-30).filter(x=>x==f).length*2

/* absence */
let a=absence(f)
score+=a.gap*0.7

/* memory */
let k3=history.slice(-3).join("-")
if(memory[k3]) score+=memory[k3]*2

let k2=history.slice(-2).join("-")
if(memory2[k2]) score+=memory2[k2]*1.5

/* anti trap */
if(history.slice(-5).filter(x=>x==f).length>=3) score-=8

/* trend */
let last10=history.slice(-10)
let v=last10.filter(x=>veg.includes(x)).length
let m=last10.filter(x=>meat.includes(x)).length

if(v>7 && meat.includes(f)) score+=3
if(m>7 && veg.includes(f)) score+=3

/* fake */
let unique=new Set(history.slice(-6)).size
if(unique<=2) score*=0.5

/* noise */
score+=Math.random()*0.01

s[f]=score

})

return s
}

/* DECISION */
function decide(s){

let sorted=Object.entries(s).sort((a,b)=>b[1]-a[1])

let top=sorted[0][1]
let second=sorted[1][1]
let conf=((top-second)/top)*100

let mode="WAIT ❌"
if(conf>30) mode="ATTACK 🔥"
else if(conf>15) mode="PLAY ⚠️"

let v=sorted.filter(x=>veg.includes(x[0]))
let m=sorted.filter(x=>meat.includes(x[0]))

let top5=[...v.slice(0,3),...m.slice(0,2)].map(x=>x[0])
let top6=[...v.slice(0,3),...m.slice(0,3)].map(x=>x[0])

return {top5,top6,conf,mode}
}

/* UPDATE */
function update(){

document.getElementById("history").innerHTML=
history.slice(-20).map(x=>"<span>"+x+"</span>").join("")

document.getElementById("heat").innerHTML=heat()

let s=brain()
let d=decide(s)

window.last=d.top5

document.getElementById("prediction").innerHTML=
"Top5: "+d.top5.join(" ")+"<br>Top6: "+d.top6.join(" ")

document.getElementById("analysis").innerHTML=
"Mode: "+d.mode+"<br>Confidence: "+d.conf.toFixed(1)+"%"

/* BOT */
if(bot && d.conf>15){
add(d.top5[0])
}

}

function toggleBot(){bot=!bot}
function toggleAuto(){auto=!auto}

load()
update()

</script></body>
</html>
