<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Greedy Cat — ULTRA GOD MODE</title><style>
body{font-family:Arial;background:#020617;color:white;text-align:center;padding:15px}
h1{color:#22c55e}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}

button{
padding:16px;
font-size:26px;
background:#1e293b;
color:white;
border:none;
border-radius:12px;
}

.best{background:#22c55e !important; box-shadow:0 0 25px #22c55e}
.good{background:#16a34a !important}

.panel{background:#0f172a;margin-top:10px;padding:10px;border-radius:10px}
</style></head><body><h1>💀 ULTRA GOD MODE</h1><div class="grid">
<button id="btn-corn" onclick="add('corn')">🌽</button>
<button id="btn-tomato" onclick="add('tomato')">🍅</button>
<button id="btn-carrot" onclick="add('carrot')">🥕</button>
<button id="btn-pepper" onclick="add('pepper')">🌶️</button>
<button id="btn-fish" onclick="add('fish')">🐟</button>
<button id="btn-shrimp" onclick="add('shrimp')">🦐</button>
<button id="btn-cow" onclick="add('cow')">🐄</button>
<button id="btn-chicken" onclick="add('chicken')">🐔</button>
</div><button onclick="undo()">Undo</button>
<button onclick="reset()">Reset</button>

<div class="panel"><b>History</b><div id="history"></div></div>
<div class="panel"><b>AI Signal</b><div id="signal"></div></div>
<div class="panel"><b>Risk</b><div id="risk"></div></div>
<div class="panel"><b>Confidence</b><div id="confidence"></div></div>
<div class="panel"><b>Top5</b><div id="top5"></div></div>
<div class="panel"><b>Explain</b><div id="explain"></div></div><script>

const foods=["corn","tomato","carrot","pepper","fish","shrimp","cow","chicken"]

const emoji={
corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",
fish:"🐟",shrimp:"🦐",cow:"🐄",chicken:"🐔"
}

let history=JSON.parse(localStorage.getItem("hist")||"[]")

let weights={
pattern:3,
absence:1,
momentum:1,
cycle:2,
deception:-3
}

let patternDB={}
let performance={correct:0,total:0}
let lastPrediction=[]

function save(){localStorage.setItem("hist",JSON.stringify(history))}

/* ===== LEARNING ===== */

function learn(result){

if(result){
weights.pattern+=0.2
weights.momentum+=0.1
}else{
weights.pattern-=0.2
weights.momentum-=0.1
}

weights.pattern=Math.max(1,weights.pattern)
weights.momentum=Math.max(0.5,weights.momentum)
}

/* ===== ADD ===== */

function add(f){

if(lastPrediction.length){
performance.total++
if(lastPrediction.includes(f)){
performance.correct++
learn(true)
}else{
learn(false)
}
}

/* pattern memory */
if(history.length>=2){
let key=history.slice(-2).join("-")
if(!patternDB[key])patternDB[key]={}
patternDB[key][f]=(patternDB[key][f]||0)+1
}

history.push(f)
save()
update()
}

/* ===== ANALYSIS ===== */

function absence(f){
let i=history.lastIndexOf(f)
return i==-1?history.length:history.length-i-1
}

function momentum(f){
return history.slice(-5).filter(x=>x==f).length
}

/* ===== CYCLE ===== */

function cycleScore(f){

let last=history.slice(-6)

for(let i=0;i<last.length-2;i++){
if(last[i]==last[i+2] && last[i]==f) return 3
}

return 0
}

/* ===== DECEPTION ===== */

function deception(){

let last=history.slice(-5)
let same=last.every(x=>x==last[0])

return same
}

/* ===== PATTERN ===== */

function patternScore(f){

if(history.length<2) return 0

let key=history.slice(-2).join("-")
return (patternDB[key]?.[f]||0)*weights.pattern
}

/* ===== SCORE ===== */

function score(f){

let s=0

s+=patternScore(f)
s+=absence(f)*weights.absence
s+=momentum(f)*weights.momentum
s+=cycleScore(f)*weights.cycle

if(deception()) s+=weights.deception

return s
}

/* ===== RISK ===== */

function risk(){

if(deception()) return "DANGER"
if(performance.total>10){
let acc=performance.correct/performance.total
if(acc<0.4) return "DANGER"
}

return "SAFE"
}

/* ===== DECISION ===== */

function signal(conf,r){

if(r=="DANGER") return "🔴 EXIT"
if(conf>35) return "🟢 ENTER"
if(conf>20) return "🟡 WAIT"
return "🔴 EXIT"
}

/* ===== UPDATE ===== */

function update(){

document.getElementById("history").innerHTML=
history.slice(-20).map(x=>emoji[x]).join(" ")

let scores={}
foods.forEach(f=>scores[f]=score(f))

let sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1])

let top5=sorted.slice(0,5).map(x=>x[0])
lastPrediction=top5

foods.forEach(f=>{
let b=document.getElementById("btn-"+f)
b.classList.remove("best","good")

if(f==top5[0]){
b.classList.add("best")
b.style.transform="scale(1.2)"
}else{
b.style.transform="scale(1)"
}

if(top5.includes(f) && f!=top5[0])
b.classList.add("good")

})

document.getElementById("top5").innerHTML=
top5.map(x=>emoji[x]).join(" ")

let spread=sorted[0][1]-sorted[2][1]
let conf=(spread/sorted[0][1])*100
conf=Math.min(Math.max(conf,10),95)

document.getElementById("confidence").innerHTML=conf.toFixed(1)+"%"

let r=risk()
document.getElementById("risk").innerHTML=r

document.getElementById("signal").innerHTML=signal(conf,r)

document.getElementById("explain").innerHTML=
emoji[top5[0]]+" ← Pattern + Cycle + Momentum"

}

update()

</script></body>
</html>
