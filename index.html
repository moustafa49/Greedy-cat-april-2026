<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Greedy Cat MAX — QUANTUM SINGULARITY AI</title><style>
body{font-family:Arial;background:#020617;color:white;text-align:center;padding:15px}
h1{color:#22c55e}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
button{padding:14px;font-size:24px;background:#1e293b;color:white;border:none;border-radius:10px}
button:hover{background:#334155}

.panel{background:#0f172a;margin-top:12px;padding:10px;border-radius:10px}
.big{font-size:22px}
.small{font-size:14px;color:#94a3b8}
</style></head><body><h1>💀 QUANTUM SINGULARITY AI</h1><div class="grid">
<button onclick="add('corn')">🌽</button>
<button onclick="add('tomato')">🍅</button>
<button onclick="add('carrot')">🥕</button>
<button onclick="add('pepper')">🌶️</button>
<button onclick="add('fish')">🐟</button>
<button onclick="add('shrimp')">🦐</button>
<button onclick="add('cow')">🐄</button>
<button onclick="add('chicken')">🐔</button>
</div><br><button onclick="undo()">Undo</button>
<button onclick="reset()">Reset</button>

<button onclick="mode='safe'">🛡️ SAFE</button>
<button onclick="mode='attack'">🔥 ATTACK</button>

<button onclick="bot=true">🤖 BOT ON</button>
<button onclick="bot=false">⛔ BOT OFF</button>

<div class="panel"><b>History</b><div id="history"></div></div>
<div class="panel"><b>Absence</b><div id="absence"></div></div>
<div class="panel"><b>Wave / Trap / Drift</b><div id="state"></div></div><div class="panel big"><b>AI Decision</b><div id="decision"></div></div><div class="panel"><b>Top5</b><div id="top5"></div></div>
<div class="panel"><b>Top6</b><div id="top6"></div></div><div class="panel"><b>Probability</b><div id="prob"></div></div>
<div class="panel"><b>Monte Carlo</b><div id="monte"></div></div><div class="panel"><b>Explain AI</b><div id="explain"></div></div>
<div class="panel"><b>Confidence</b><div id="confidence"></div></div><script>

const foods=["corn","tomato","carrot","pepper","fish","shrimp","cow","chicken"]
const veg=["corn","tomato","carrot","pepper"]
const meat=["fish","shrimp","cow","chicken"]

const emoji={
corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",
fish:"🐟",shrimp:"🦐",cow:"🐄",chicken:"🐔"
}

let history=JSON.parse(localStorage.getItem("hist")||"[]")
let weights={}
foods.forEach(f=>weights[f]=1)

let transition={}
let mode="safe"
let bot=false

function save(){
localStorage.setItem("hist",JSON.stringify(history))
}

function add(f){
if(history.length){
let prev=history[history.length-1]
if(!transition[prev])transition[prev]={}
transition[prev][f]=(transition[prev][f]||0)+1
}
history.push(f)
save()
update()
}

function undo(){history.pop();save();update()}
function reset(){history=[];save();update()}

/* ===== ANALYSIS ===== */

function absence(f){
let i=history.lastIndexOf(f)
if(i==-1)return history.length
return history.length-i-1
}

function momentum(f){
return history.slice(-5).filter(x=>x==f).length
}

function wave(){
let last=history.slice(-10)
let v=last.filter(x=>veg.includes(x)).length
let m=last.filter(x=>meat.includes(x)).length
if(v>m)return "Vegetable"
if(m>v)return "Meat"
return "Mixed"
}

function trap(){
let last=history.slice(-4)
return last.length>=4 && last.every(x=>x==last[0])
}

function drift(){
let last=history.slice(-6)
let types=last.map(x=>veg.includes(x)?"v":"m")
return new Set(types).size>1
}

/* ===== AI SCORE ===== */

function score(f){

let s=0

s+=absence(f)*0.6
s+=momentum(f)*1.2

let last=history[history.length-1]
if(transition[last] && transition[last][f])
s+=transition[last][f]*0.7

if(wave()=="Vegetable" && meat.includes(f)) s+=2
if(wave()=="Meat" && veg.includes(f)) s+=2

if(trap() && f!=history[history.length-1]) s+=2

if(mode=="attack") s*=1.3

s+=Math.random()*0.3

return s
}

/* ===== MONTE ===== */

function monteCarlo(){
let sim={}
foods.forEach(f=>sim[f]=0)

for(let i=0;i<12000;i++){
let scores={}
foods.forEach(f=>scores[f]=score(f))

let total=Object.values(scores).reduce((a,b)=>a+b,0)
let r=Math.random()*total
let c=0

for(let f of foods){
c+=scores[f]
if(r<=c){sim[f]++;break}
}
}

foods.forEach(f=>sim[f]=(sim[f]/12000*100).toFixed(1))
return sim
}

/* ===== UPDATE ===== */

function update(){

document.getElementById("history").innerHTML=
history.slice(-20).map(x=>emoji[x]).join(" ")

document.getElementById("absence").innerHTML=
foods.map(f=>emoji[f]+"("+absence(f)+")").join(" | ")

let state=wave()+" | "+(trap()?"TRAP":"OK")+" | "+(drift()?"DRIFT":"STABLE")
document.getElementById("state").innerHTML=state

let scores={}
foods.forEach(f=>scores[f]=score(f))

let sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1])

let vegTop=sorted.filter(x=>veg.includes(x[0])).slice(0,3).map(x=>x[0])
let meatTop=sorted.filter(x=>meat.includes(x[0])).slice(0,2).map(x=>x[0])

let top5=[...vegTop,...meatTop]

let meat3=sorted.filter(x=>meat.includes(x[0])).slice(0,3).map(x=>x[0])
let top6=[vegTop[0],vegTop[1],vegTop[2],meat3[0],meat3[1],meat3[2]]

document.getElementById("top5").innerHTML=top5.map(x=>emoji[x]).join(" ")
document.getElementById("top6").innerHTML=top6.map(x=>emoji[x]).join(" ")

let total=Object.values(scores).reduce((a,b)=>a+b,0)
document.getElementById("prob").innerHTML=
foods.map(f=>emoji[f]+" "+((scores[f]/total)*100).toFixed(1)+"%").join(" | ")

let monte=monteCarlo()
document.getElementById("monte").innerHTML=
foods.map(f=>emoji[f]+" "+monte[f]+"%").join(" | ")

let best=sorted[0]
let second=sorted[1]

let conf=((best[1]-second[1])/best[1])*100
document.getElementById("confidence").innerHTML=conf.toFixed(1)+"%"

let decision="WAIT"
if(conf>25 && !trap()) decision="PLAY"
if(trap()) decision="SKIP"

document.getElementById("decision").innerHTML=decision

document.getElementById("explain").innerHTML=
emoji[best[0]]+" بسبب: Absence "+absence(best[0])+" | Wave "+wave()+" | Mode "+mode

if(bot && decision=="PLAY"){
add(top5[0])
}

}

update()

</script></body>
</html>
